<!DOCTYPE html>
<html lang="da">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ejer Login — SandwichNSmoothies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Anton&family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet">
  <style>
    :root {
      --orange: #E8720C;
      --orange-dk: #C8600A;
      --green: #27AE60;
      --dark: #111111;
      --white: #FFFFFF;
      --off-white: #F7F7F5;
      --light: #F0F0ED;
      --font-body: 'Inter', sans-serif;
      --font-display: 'Anton', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-body);
      background: var(--off-white);
      color: var(--dark);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .login-container {
      background: var(--white);
      border-radius: 18px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.08);
      padding: 60px 48px;
      max-width: 420px;
      width: 100%;
    }

    .logo-section {
      text-align: center;
      margin-bottom: 40px;
    }

    .logo-section img {
      height: 80px;
      width: auto;
      margin-bottom: 16px;
      object-fit: contain;
    }

    .logo-section h1 {
      font-family: var(--font-display);
      font-size: 1.8rem;
      color: var(--dark);
      letter-spacing: 0.05em;
      margin-bottom: 8px;
    }

    .logo-section p {
      font-size: 0.9rem;
      color: rgba(17,17,17,0.6);
    }

    .form-group {
      margin-bottom: 20px;
    }

    label {
      display: block;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 8px;
      color: var(--dark);
      letter-spacing: 0.02em;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 12px 16px;
      border: 1.5px solid rgba(0,0,0,0.12);
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      outline: none;
      border-color: var(--orange);
      box-shadow: 0 0 0 3px rgba(232, 114, 12, 0.1);
    }

    .login-btn {
      width: 100%;
      padding: 14px 24px;
      background: var(--orange);
      color: var(--white);
      border: none;
      border-radius: 10px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      cursor: pointer;
      transition: background 0.2s, transform 0.15s;
      margin-top: 12px;
    }

    .login-btn:hover {
      background: var(--orange-dk);
      transform: translateY(-2px);
    }

    .login-btn:active {
      transform: translateY(0);
    }

    .back-link {
      text-align: center;
      margin-top: 24px;
    }

    .back-link a {
      font-size: 0.85rem;
      color: var(--orange);
      text-decoration: none;
      transition: color 0.2s;
      font-weight: 600;
    }

    .back-link a:hover {
      color: var(--orange-dk);
    }

    .demo-notice {
      background: rgba(232, 114, 12, 0.08);
      border-left: 4px solid var(--orange);
      border-radius: 6px;
      padding: 12px 16px;
      margin-bottom: 24px;
      font-size: 0.85rem;
      color: rgba(17,17,17,0.7);
      line-height: 1.5;
    }

    .demo-notice strong {
      color: var(--dark);
      display: block;
      margin-bottom: 4px;
    }

    @media (max-width: 480px) {
      .login-container {
        padding: 40px 28px;
      }

      .logo-section h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="logo-section">
      <img src="Gemini_Generated_Image_e8exene8exene8ex.png" alt="SandwichNSmoothies">
      <h1>Owner Login</h1>
      <p>Manage your orders &amp; operations</p>
    </div>

    <div class="demo-notice">
      <strong>⚠️ Demo Mode</strong>
      This is a placeholder login page for client demonstration. A full authentication system will be implemented.
    </div>

    <form id="loginForm">
      <div class="form-group">
        <label for="email">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          placeholder="owner@example.com" 
          required
        >
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input 
          type="password" 
          id="password" 
          name="password" 
          placeholder="••••••••" 
          required
        >
      </div>

      <button type="submit" class="login-btn">Sign In</button>
    </form>

    <div class="back-link">
      <a href="index.html">← Back to Website</a>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', (e) => {
      e.preventDefault();
      alert('✓ Demo Login Successful!\n\nThis is a placeholder page.\nFull admin dashboard functionality will be implemented.');
      // In a real app, this would send credentials to a server
    });
  </script>
</body>
</html>
